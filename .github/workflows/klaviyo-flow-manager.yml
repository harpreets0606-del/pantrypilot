name: Klaviyo Flow Manager

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to run'
        required: true
        default: 'list-flows'
        type: choice
        options:
          - list-flows
          - pause-triple-pixel
          - create-templates
          - create-flows
          - audit-flows
          - fix-templates
          - fix-footers
          - fix-thresholds
          - report-manual-fixes
          - verify-flows
          - all

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Verify Klaviyo API key is set
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: |
          if [ -z "$KLAVIYO_API_KEY" ]; then
            echo "::error::KLAVIYO_API_KEY secret is not set in repo settings"
            exit 1
          fi
          echo "✅ KLAVIYO_API_KEY is configured"

      - name: List flows
        if: ${{ inputs.action == 'list-flows' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: |
          python -c "
          import os, requests
          headers = {
            'Authorization': f'Klaviyo-API-Key {os.environ[\"KLAVIYO_API_KEY\"]}',
            'revision': '2024-10-15'
          }
          r = requests.get('https://a.klaviyo.com/api/flows?fields[flow]=name,status,trigger_type', headers=headers)
          for f in r.json().get('data', []):
            a = f['attributes']
            print(f\"  {f['id']:8s} | {a['status']:8s} | {a['name']}\")
          "

      - name: Pause Triple Pixel flows
        if: ${{ inputs.action == 'pause-triple-pixel' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --pause-triple-pixel

      - name: Create email templates
        if: ${{ inputs.action == 'create-templates' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --create-templates

      - name: Create flow shells
        if: ${{ inputs.action == 'create-flows' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --create-flows

      - name: Audit all flows
        if: ${{ inputs.action == 'audit-flows' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --audit-flows

      - name: Fix all templates (footers + thresholds)
        if: ${{ inputs.action == 'fix-templates' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --fix-templates

      - name: Fix compliance footers only
        if: ${{ inputs.action == 'fix-footers' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --fix-footers

      - name: Fix stale thresholds only
        if: ${{ inputs.action == 'fix-thresholds' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --fix-thresholds

      - name: Report manual fixes required
        if: ${{ inputs.action == 'report-manual-fixes' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --report-manual-fixes

      - name: Verify flow state
        if: ${{ inputs.action == 'verify-flows' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --verify-flows

      - name: Run all
        if: ${{ inputs.action == 'all' }}
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python scripts/klaviyo_flow_manager.py --all
